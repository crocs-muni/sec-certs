repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: ["--check"]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.19.1"
    hooks:
      - id: mypy
        additional_dependencies:
          - "numpy"
          - "types-PyYAML"
          - "types-python-dateutil"
          - "types-requests"
          - "types-dateparser"
          - "datasets"
