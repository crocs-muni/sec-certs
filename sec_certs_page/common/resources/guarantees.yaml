webpage_information:
  level: certified
  label: "Official listing data"
  description: >-
    Information taken from the official source that lists this certificate.

heuristics:
  level: derived
  label: "Automatically derived data"
  description: >-
    These values are inferred automatically by our algorithms from the
    certification documents and public databases. Treat them as a research
    starting point, not ground truth. To verify any item, follow the links to
    the source document, the NVD entry, or the scheme's listing.

related_cves:
  level: derived
  label: "Related CVEs"
  description: >-
    Publicly known vulnerabilities (CVEs) reported for the product we
    matched to this certificate via CPE. A listed CVE does not necessarily
    mean the certified configuration is affected — it means a product we
    linked here has a reported vulnerability. Always check the affected
    product and version.

validation_dates:
  level: certified
  label: "Validation dates"
  description: >-
    The period during which the certificate is officially valid according to
    the scheme. After 'Valid until' the certificate is considered
    archived/expired — the product may still be in use, but the certification
    is no longer current.

updates:
  level: derived
  label: "Updates"
  description: >-
    A log of how this entry's data changed across our periodic updates (New / Changed / Removed).
    Changes may reflect updates to the source listing or improvements in our own data extraction

references:
  level: derived
  label: "References"
  description: >-
    Other certificates linked to this one, detected by matching certificate
    IDs in the PDF documents. Outgoing = certificates mentioned in this
    certificate's documents; Incoming = certificates whose documents mention
    this one.
